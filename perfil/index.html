<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico de Sistema Nutricional | Edu Sidegum — HLF</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="protecao-copia" content="ativado">
    <link rel="stylesheet" href="../assets/css/style_verde.css">
    <style>
        .pergunta-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
        .pergunta-text { font-size: 0.9rem; flex: 1; padding-right: 10px; }
        .options { display: flex; gap: 10px; }
        .btn-check { cursor: pointer; padding: 5px 15px; border: 1px solid var(--garden); border-radius: 20px; font-size: 0.8rem; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + label { background: var(--garden); color: white; }
        .form-footer { margin-top: 30px; text-align: center; }
    </style>
</head>
<body>
    <div id="topbar-placeholder"></div>
    <main class="container">
        <header>
            <h1>Autoavaliação de Bem-Estar</h1>
            <p>Responda com sinceridade para que o sistema processe seu perfil nutricional.</p>
        </header>

        <form id="diagnosticoForm">
            <!-- As 22 Perguntas Estruturadas (Exemplos do Bloco Original) -->
            <div id="perguntas-container">
                <script>
                    const perguntas = [
                        "Você faz pelo menos 3 refeições ao dia?",
                        "Consome frutas e verduras diariamente?",
                        "Bebe pelo menos 2 litros de água por dia?",
                        "Sente cansaço excessivo ao longo do dia?",
                        "Tem dificuldade para dormir ou sono agitado?",
                        "Consome frituras ou doces mais de 3x na semana?",
                        "Pratica atividade física regularmente?",
                        "Sente inchaço abdominal com frequência?",
                        "Costuma pular o café da manhã?",
                        "Sente fome excessiva no período da noite?",
                        "Consome bebidas açucaradas (sucos/refri)?",
                        "Sua digestão é lenta ou pesada?",
                        "Tem intestino preso ou irregular?",
                        "Consome álcool com frequência?",
                        "Sente-se estressado com facilidade?",
                        "Tem o hábito de beliscar entre as refeições?",
                        "Já tentou dietas restritivas sem sucesso?",
                        "Deseja reduzir medidas ou gordura localizada?",
                        "Deseja aumentar sua massa muscular?",
                        "Deseja ter mais energia e disposição?",
                        "Está disposto a investir na sua saúde mensalmente?",
                        "Busca um acompanhamento profissional dedicado?"
                    ];

                    const container = document.getElementById('perguntas-container');
                    perguntas.forEach((p, i) => {
                        container.innerHTML += `
                            <div class="pergunta-row">
                                <span class="pergunta-text">${i+1}. ${p}</span>
                                <div class="options">
                                    <input type="radio" name="q${i}" id="q${i}s" value="1" required>
                                    <label for="q${i}s" class="btn-check">SIM</label>
                                    <input type="radio" name="q${i}" id="q${i}n" value="0">
                                    <label for="q${i}n" class="btn-check">NÃO</label>
                                </div>
                            </div>
                        `;
                    });
                </script>
            </div>

            <div class="form-footer">
                <button type="submit" class="btn-primary-whats" style="background: #2E8B57; width: 100%;">GERAR MEU DIAGNÓSTICO AGORA</button>
            </div>
        </form>
    </main>
    <div id="footer-placeholder"></div>

    <script src="../assets/js/bloco-incluir.js" defer></script>
    <script>
        document.getElementById('diagnosticoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let score = 0;
            const formData = new FormData(this);
            for (let value of formData.values()) {
                score += parseInt(value);
            }
            // Lógica de Redirecionamento e Encaminhamento WhatsApp
            const msg = `Olá Carlos! Acabei de fazer meu diagnóstico de sistema. Meu score foi: ${score}/22. Quero minha proposta personalizada.`;
            const waUrl = `https://wa.me/5551999663200?text=${encodeURIComponent(msg)}`;
            
            // Salva o score para a página de avaliação ler
            localStorage.setItem('perfil_score', score);
            
            // Redireciona para a página de avaliação técnica
            window.location.href = 'avaliacao.html';
        });
    </script>
</body>
</html>
